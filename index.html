<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио начинающего фронтенд-разработчика</title>
  <meta
    name="description"
    content="Небольшое портфолио начинающего фронтенд-разработчика с кратким описанием и списком ключевых навыков."
  >
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="hero">
    <h1>Привет, я будущий фронтенд-разработчик!</h1>
    <p>Изучаю HTML, CSS и JavaScript и собираю первые проекты в аккуратное портфолио.</p>
  </header>

  <main>
    <section class="profile">
      <img
        src="./assets/main-photo.svg"
        alt="Иллюстрация профиля разработчика"
        id="main-photo"
        width="320"
        height="320"
      >
      <p>Этот сайт показывает мой текущий стек и помогает подготовить проект к публикации на GitHub Pages.</p>
    </section>

    <section class="skills" aria-labelledby="skills-title">
      <h2 id="skills-title">Мои навыки</h2>
      <ul id="skills-list"></ul>
    </section>
  </main>

  <script src="./js/main-script.js"></script>
</body>
</html>
